services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: askmydocs-postgres
    environment:
      POSTGRES_DB: askmydocs
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d askmydocs"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
